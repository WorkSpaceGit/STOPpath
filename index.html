<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Зупинковий шлях</title>
    <meta name="theme-color" content="#0b1120" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Зупинка" />
    <link id="favicon" rel="icon" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #0b1120;
        --surface: #111827;
        --border: #1f2d45;
        --text: #e2e8f0;
        --muted: #64748b;
        --blue: #3b82f6;
        --green: #22c55e;
        --yellow: #eab308;
        --orange: #f97316;
        --red: #ef4444;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
        font-family: "Barlow", sans-serif;
        background: var(--bg);
        color: var(--text);
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }
      .app {
        display: flex;
        flex-direction: column;
        height: 100dvh;
        max-width: 480px;
        margin: 0 auto;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 16px 8px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .header-title {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 20px;
        font-weight: 900;
        letter-spacing: 0.5px;
        color: #fff;
      }
      .header-title span {
        color: var(--red);
      }
      .badge {
        font-size: 11px;
        font-weight: 600;
        color: var(--red);
        border: 1px solid rgba(239, 68, 68, 0.35);
        background: rgba(239, 68, 68, 0.1);
        padding: 2px 8px;
        border-radius: 20px;
      }

      .hud {
        display: flex;
        flex-direction: column;
        padding: 12px;
        gap: 8px;
        flex-shrink: 0;
        background: var(--bg);
      }

      .hud-main {
        background: var(--surface);
        border: 2px solid var(--blue);
        border-radius: 14px;
        padding: 12px;
        text-align: center;
        box-shadow: 0 4px 16px rgba(59, 130, 246, 0.15);
        position: relative;
        overflow: hidden;
        transition: border-color 0.4s, background 0.4s, box-shadow 0.4s;
      }
      .hud-main::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, var(--yellow), var(--red));
      }
      .hud-main-label {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 14px;
        color: var(--blue);
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: color 0.4s;
      }
      .hud-main-val {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 42px;
        font-weight: 900;
        color: #fff;
        line-height: 1;
        margin: 4px 0;
        transition: color 0.4s;
      }
      .hud-main-sub {
        font-size: 13px;
        color: var(--muted);
        font-weight: 500;
        min-height: 18px; 
        transition: color 0.4s;
      }

      .hud-row {
        display: flex;
        gap: 8px;
      }
      .hud-card {
        flex: 1;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 8px 12px;
        text-align: center;
        transition:
          border-color 0.3s,
          background 0.3s;
      }
      .hud-label {
        font-size: 10px;
        color: var(--muted);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        margin-bottom: 2px;
      }
      .hud-value {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 24px;
        font-weight: 700;
        line-height: 1;
      }
      .hud-unit {
        font-size: 12px;
        font-weight: 400;
        color: var(--muted);
        margin-left: 2px;
      }
      .hl-react {
        border-color: var(--yellow) !important;
        background: rgba(234, 179, 8, 0.1) !important;
      }
      .hl-brake {
        border-color: var(--red) !important;
        background: rgba(239, 68, 68, 0.1) !important;
      }

      .hud {
        transition: all 0.4s ease;
      }
      .hud.hud-cruise .hud-main-sub {
        visibility: hidden;
      }
      .hud.hud-cruise .hud-row {
        opacity: 0.35;
        pointer-events: none;
      }

      .hud.hud-react .hud-main {
        border-color: var(--yellow);
        background: rgba(234, 179, 8, 0.07);
        box-shadow: 0 4px 16px rgba(234, 179, 8, 0.2);
      }
      .hud.hud-react .hud-main::before {
        background: var(--yellow);
      }
      .hud.hud-react .hud-main-val {
        color: var(--yellow);
      }
      .hud.hud-react .hud-main-label {
        color: var(--yellow);
      }
      .hud.hud-react .hud-main-sub {
        color: rgba(234,179,8,0.7);
      }
      .hud.hud-react .hud-row {
        opacity: 0.2;
        pointer-events: none;
      }

      .hud.hud-brake .hud-main {
        border-color: var(--red);
        background: rgba(239, 68, 68, 0.07);
        box-shadow: 0 4px 16px rgba(239, 68, 68, 0.2);
      }
      .hud.hud-brake .hud-main::before {
        background: var(--red);
      }
      .hud.hud-brake .hud-main-val {
        color: var(--red);
      }
      .hud.hud-brake .hud-main-label {
        color: var(--red);
      }
      .hud.hud-brake .hud-main-sub {
        color: rgba(239,68,68,0.7);
      }
      .hud.hud-brake #cardReact {
        opacity: 0.2;
      }
      .hud.hud-brake #cardBrake {
        opacity: 1;
      }

      .sim-area {
        flex: 1;
        display: flex;
        min-height: 0;
        border-top: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
        overflow: hidden;
      }

      .ruler {
        width: 60px;
        flex-shrink: 0;
        background: #070c18;
        border-right: 2px solid var(--border);
        position: relative;
        overflow: hidden;
      }
      .ruler-phase {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 9;
        text-align: center;
        padding: 4px 3px;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        background: #070c18;
        border-top: 1px solid var(--border);
        color: var(--muted);
        transition:
          color 0.25s,
          border-color 0.25s;
        line-height: 1.4;
        min-height: 42px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .ruler-phase.ph-react {
        color: var(--yellow);
        border-color: rgba(234, 179, 8, 0.5);
      }
      .ruler-phase.ph-brake {
        color: var(--red);
        border-color: rgba(239, 68, 68, 0.5);
      }
      .ruler-phase.ph-done {
        color: var(--green);
        border-color: rgba(34, 197, 94, 0.5);
      }
      .ruler-top-lbl {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        z-index: 6;
        text-align: center;
        padding: 4px 2px;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 9px;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.6px;
        background: #070c18;
        border-bottom: 1px solid var(--border);
      }
      .ruler-total-txt {
        color: #fff;
        font-size: 14px;
        margin-top: 2px;
        display: block;
      }

      .ruler-zones {
        position: absolute;
        bottom: 56px;
        left: 0;
        right: 0;
        display: flex;
        flex-direction: column-reverse;
      }

      .rz-react {
        width: 100%;
        height: 0;
        background: linear-gradient(
          to top,
          rgba(234, 179, 8, 0.08),
          rgba(234, 179, 8, 0.42)
        );
        border-bottom: 3px solid var(--yellow);
        display: flex;
        flex-direction: column-reverse;
        align-items: center;
        overflow: hidden;
        transition: height 0.06s linear;
      }
      .rz-brake {
        width: 100%;
        height: 0;
        background: linear-gradient(
          to top,
          rgba(239, 68, 68, 0.08),
          rgba(239, 68, 68, 0.46)
        );
        border-bottom: 3px solid var(--red);
        display: flex;
        flex-direction: column-reverse;
        align-items: center;
        overflow: hidden;
        transition: height 0.06s linear;
      }

      .rz-m {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 5px;
        opacity: 0;
        transition: opacity 0.25s;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
      }
      .rz-m.show {
        opacity: 1;
      }
      .rz-react .rz-m {
        color: var(--yellow);
      }
      .rz-brake .rz-m {
        color: var(--red);
      }

      .rz-lbl {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        writing-mode: vertical-rl;
        transform: rotate(180deg);
        margin-bottom: 3px;
        opacity: 0;
        transition: opacity 0.3s;
      }
      .rz-lbl.show {
        opacity: 0.65;
      }
      .rz-react .rz-lbl {
        color: var(--yellow);
      }
      .rz-brake .rz-lbl {
        color: var(--red);
      }

      .ruler-dot {
        position: absolute;
        left: 6px;
        right: 6px;
        height: 4px;
        background: var(--blue);
        border-radius: 2px;
        box-shadow: 0 0 10px var(--blue);
        bottom: 56px;
        z-index: 8;
        transition: bottom 0.06s linear;
      }

      .canvas-wrap {
        flex: 1;
        position: relative;
        overflow: hidden;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .banner {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        padding: 5px 18px;
        border-radius: 20px;
        pointer-events: none;
        white-space: nowrap;
        z-index: 10;
        opacity: 0;
        transition: opacity 0.25s;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
      }
      .banner.show {
        opacity: 1;
      }
      .banner.warn {
        background: rgba(249, 115, 22, 0.15);
        border: 1px solid rgba(249, 115, 22, 0.55);
        color: var(--orange);
      }
      .banner.react {
        background: rgba(234, 179, 8, 0.15);
        border: 1px solid rgba(234, 179, 8, 0.55);
        color: var(--yellow);
      }
      .banner.brake {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.55);
        color: var(--red);
      }
      .banner.done {
        background: rgba(34, 197, 94, 0.15);
        border: 1px solid rgba(34, 197, 94, 0.55);
        color: var(--green);
      }

      .controls {
        padding: 12px 0;
        flex-shrink: 0;
        background: var(--bg);
      }

      .speed-signs-wrap {
        display: flex;
        gap: 12px;
        overflow-x: auto;
        padding: 4px 16px 16px 16px;
        scroll-snap-type: x mandatory;
        scrollbar-width: none;
      }
      .speed-signs-wrap::-webkit-scrollbar {
        display: none;
      }

      .speed-sign {
        width: 48px;
        height: 48px;
        flex-shrink: 0;
        cursor: pointer;
        scroll-snap-align: center;
        transition:
          transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
          box-shadow 0.2s;
        border-radius: 50%;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      }
      .speed-sign.active {
        transform: scale(1.2);
        box-shadow:
          0 0 0 3px var(--bg),
          0 0 0 5px var(--blue),
          0 6px 16px rgba(218, 37, 29, 0.5);
        z-index: 2;
      }

      .hud.hud-result .hud-main {
        border-color: var(--green);
        background: rgba(34, 197, 94, 0.07);
      }
      .hud.hud-result .hud-main-label {
        color: var(--green);
      }
      .hud.hud-result .hud-main-val {
        color: var(--green);
      }
      .hud.hud-result .hud-main::before {
        background: var(--green);
      }
      .hud.hud-result #cardReact {
        opacity: 1;
      }
      .hud.hud-result #cardBrake {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <div class="header-title">Зупинковий <span>Шлях</span></div>
        <div class="badge">ПДР · Симулятор</div>
      </header>

      <div class="hud">
        <div class="hud-main">
          <div class="hud-main-label">Зупинковий шлях</div>
          <div class="hud-main-val">
            <span id="uiTotal">25</span
            ><span class="hud-unit-m" style="font-size: 20px"> м</span>
          </div>
          <div class="hud-main-sub">
            <span id="uiSpeed">при 50 км/год</span>
          </div>
        </div>

        <div class="hud-row">
          <div class="hud-card" id="cardReact">
            <div class="hud-label" id="lblReact" style="color: var(--yellow)">
              Реакція (~1 с = ~14 м)
            </div>
            <div class="hud-value" style="color: var(--yellow)">
              <span id="uiReact">14</span><span class="hud-unit">м</span>
            </div>
          </div>
          <div class="hud-card" id="cardBrake">
            <div class="hud-label" style="color: var(--red)">
              Гальмовий шлях
            </div>
            <div class="hud-value" style="color: var(--red)">
              <span id="uiBrake">11</span><span class="hud-unit">м</span>
            </div>
          </div>
        </div>
      </div>

      <div class="sim-area">
        <div class="ruler" id="ruler">
          <div class="ruler-top-lbl">
            Зупинка<br /><span class="ruler-total-txt" id="rulerTotal">25 м</span>
          </div>
          <div class="ruler-zones" id="rulerZones">
            <div class="rz-react" id="rzReact">
              <div class="rz-m" id="rzReactM">0 м</div>
              <div class="rz-lbl" id="rzReactL">Реакція</div>
            </div>
            <div class="rz-brake" id="rzBrake">
              <div class="rz-m" id="rzBrakeM">0 м</div>
              <div class="rz-lbl" id="rzBrakeL">Гальмо</div>
            </div>
          </div>
          <div class="ruler-dot" id="rulerDot"></div>
          <div class="ruler-phase" id="rulerPhase">—</div>
        </div>

        <div class="canvas-wrap">
          <canvas id="simCanvas"></canvas>
          <div class="banner" id="banner"></div>
        </div>
      </div>

      <div class="controls">
        <div class="speed-signs-wrap" id="speedSignsWrap"></div>
      </div>
    </div>

    <script>
      (function () {
        const s = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" rx="22" fill="#0b1120"/>
    <rect x="14" y="60" width="30" height="7" rx="3" fill="#eab308"/>
    <rect x="56" y="60" width="30" height="7" rx="3" fill="#ef4444"/>
    <text x="50" y="52" font-size="22" text-anchor="middle" fill="#fff" font-family="Arial Black,sans-serif" font-weight="900">ШЛЯХ</text>
  </svg>`;
        document.getElementById("favicon").href =
          "data:image/svg+xml;charset=utf-8," + encodeURIComponent(s);
      })();

      // ── Кешовані DOM-елементи ──────────────────────────
      const simCvs       = document.getElementById("simCanvas");
      const ctx          = simCvs.getContext("2d");
      const speedWrap    = document.getElementById("speedSignsWrap");
      const bannerEl     = document.getElementById("banner");
      const hud          = document.querySelector(".hud");
      const hudMainLabel = document.querySelector(".hud-main-label");
      const hudMainVal   = document.getElementById("uiTotal");
      const hudMainSub   = document.getElementById("uiSpeed");
      const cardReact    = document.getElementById("cardReact");
      const cardBrake    = document.getElementById("cardBrake");
      const elReact      = document.getElementById("uiReact");
      const elBrake      = document.getElementById("uiBrake");
      const elLblReact   = document.getElementById("lblReact");
      const elRulerTotal = document.getElementById("rulerTotal");
      const rzReact      = document.getElementById("rzReact");
      const rzBrake      = document.getElementById("rzBrake");
      const rzReactM     = document.getElementById("rzReactM");
      const rzBrakeM     = document.getElementById("rzBrakeM");
      const rzReactL     = document.getElementById("rzReactL");
      const rzBrakeL     = document.getElementById("rzBrakeL");
      const rulerZonesEl = document.getElementById("rulerZones");
      const rulerDot     = document.getElementById("rulerDot");
      const ruler        = document.getElementById("ruler");
      const rulerPhaseEl = document.getElementById("rulerPhase");
      const rulerPhaseLbl = document.createElement("span");
      const rulerPhaseM   = document.createElement("span");
      rulerPhaseM.style.cssText = "font-size:12px";
      rulerPhaseEl.innerHTML = "";
      rulerPhaseEl.appendChild(rulerPhaseLbl);
      rulerPhaseEl.appendChild(rulerPhaseM);

      // ── Константи ────────────────────────────────────────────────────────────
      const CAR_W      = 30;
      const CAR_H      = 52;
      const CAR_R      = 6;
      const TREES      = 9;
      const CAR_Y_FRAC = 0.93;
      const SCENE_FRAC = 0.85;
      const RULER_PHASE_H = 50; 
      const RULER_HDR_H   = 35; 
      const STOP_SPEED_MPS = 0.05;

      // ── Стан симуляції ───────────────────────────────────────────────────────
      const S = {
        phase: "idle",
        kmh: 50,
        total: 0,
        react: 0,
        brake: 0,
        roadOff: 0,
        trees: [],

        pedDist: 0,
        pedX: 0,
        obsActive: false,
        pedWalkTime: 0,
        pedWalkDir: 1,

        cameraLocked: false,
        fixedDangerY: 0,
        fixedPedY: 0,
        crosswalkY: 0,

        rTraveled: 0,
        bTraveled: 0,
        cruiseSec: 0,
        userReactSec: 0,
      };

      // ── Глобальний стан розмітки (Layout) для оптимізації ──────────────────
      const layoutState = { W: 0, H: 0, roadW: 0, cx: 0, carY: 0, pxM: 0 };

      function updateLayout() {
        const dpr = devicePixelRatio || 1;
        layoutState.W = simCvs.width / dpr;
        layoutState.H = simCvs.height / dpr;
        layoutState.roadW = Math.min(150, layoutState.W * 0.55);
        layoutState.cx = layoutState.W / 2;
        layoutState.carY = layoutState.H * CAR_Y_FRAC;
        layoutState.pxM = Math.max(4, (layoutState.H * SCENE_FRAC) / Math.max(S.total, 1));
      }

      // ── Знаки швидкості ──────────────────────────────────────────────────────
      function buildSigns() {
        let html = "";
        for (let s = 30; s <= 130; s += 10) {
          html += `<svg viewBox="0 0 100 100" class="speed-sign ${s === S.kmh ? "active" : ""}" data-speed="${s}">
      <circle cx="50" cy="50" r="45" fill="#fff" stroke="#da251d" stroke-width="10"/>
      <text x="50" y="68" font-family="'Barlow Condensed', sans-serif" font-size="46" font-weight="900" text-anchor="middle" fill="#000">${s}</text>
    </svg>`;
        }
        speedWrap.innerHTML = html;
      }
      buildSigns();

      // Делегування подій для знаків швидкості
      speedWrap.addEventListener("click", (e) => {
        const sign = e.target.closest(".speed-sign");
        if (!sign) return;
        setSpeed(parseInt(sign.dataset.speed));
      });

      function setSpeed(v) {
        if (S.phase !== "idle" && S.phase !== "done") return;
        S.kmh = v;
        applyCalc(v);
        updateLayout(); // Оновлюємо масштаб, оскільки змінився S.total
        speedWrap.querySelectorAll(".speed-sign").forEach((el) =>
          el.classList.toggle("active", parseInt(el.dataset.speed) === v),
        );
        const sign = speedWrap.querySelector(`.speed-sign[data-speed="${v}"]`);
        if (sign) sign.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
        rulerIdlePreview();
        setTimeout(startSim, 300);
      }

      // ── Розрахунок відстаней ─────────────────────────────────────────────────
      function computeDist(v) {
        const t = Math.floor(v / 10);
        const total = t * t;
        const react = Math.round((v * 1000) / 3600);
        return { total, react, brake: Math.max(1, total - react) };
      }

      function applyCalc(v) {
        const c = computeDist(v);
        S.total = c.total;
        S.react = c.react;
        S.brake = c.brake;
        hudMainSub.textContent   = `при ${v} км/год`;
        hudMainVal.textContent   = c.total;
        elReact.textContent      = c.react;
        elBrake.textContent      = c.brake;
        elLblReact.textContent   = `Реакція (~1 с = ~${c.react} м)`;
        elRulerTotal.textContent = c.total + " м";
        hudMainLabel.textContent = "Зупинковий шлях";
      }

      // ── Оновлення HUD під час симуляції ─────────────────────────────────────
      function updateHudMain() {
        if (S.phase === "react") {
          const m = Math.round(S.rTraveled);
          hudMainLabel.textContent = "⏱ Час реакції";
          hudMainVal.textContent   = m;
          hudMainSub.textContent   = `пройдено ${m} з ${S.react} м`;
        } else if (S.phase === "brake") {
          const m = Math.round(S.bTraveled);
          hudMainLabel.textContent = "🛑 Гальмовий шлях";
          hudMainVal.textContent   = m;
          hudMainSub.textContent   = `пройдено ${m} з ${S.brake} м`;
        }
      }

      // ── Дерева ───────────────────────────────────────────────────────────────
      function spawnTrees(H) {
        S.trees = [];
        for (let i = 0; i < TREES; i++)
          S.trees.push({
            y: (H / TREES) * i,
            side: Math.random() > 0.5 ? 1 : -1,
            sz: 12 + Math.random() * 9,
          });
      }

      // ── Resize ───────────────────────────────────────────────────────────────
      function resize() {
        const dpr = devicePixelRatio || 1;
        const rc = simCvs.parentElement.getBoundingClientRect();
        simCvs.width  = rc.width  * dpr;
        simCvs.height = rc.height * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        
        updateLayout();
        spawnTrees(layoutState.H);
        updateRulerDot();
        rulerIdlePreview();
      }
      window.addEventListener("resize", resize);

      // ── Слайдер (ruler) ──────────────────────────────────────────────────────
      function rulerH() {
        return ruler.getBoundingClientRect().height;
      }

      function getRulerDotBottom(rH, H, carY) {
        return RULER_PHASE_H + Math.max(4, (1 - carY / H) * (rH - RULER_PHASE_H - RULER_HDR_H));
      }

      function updateRulerDot() {
        const rH = rulerH();
        const dotBottom = getRulerDotBottom(rH, layoutState.H, layoutState.carY);
        rulerDot.style.bottom      = dotBottom + "px";
        rulerZonesEl.style.bottom  = dotBottom + "px";
      }

      function updateRuler(layout, live) {
        const { pxM, carY, H } = layout;
        const rH = rulerH();
        const baseDotBottom = getRulerDotBottom(rH, H, carY);
        const avail = rH - baseDotBottom - RULER_HDR_H;
        const scale = S.total > 0 ? Math.min(1, avail / (S.total * pxM)) : 1;

        const rVal = live ? S.rTraveled : S.react;
        const bVal = live ? S.bTraveled : S.brake;
        const rpx = Math.min(rVal * pxM * scale, avail);
        const bpx = Math.min(bVal * pxM * scale, avail - rpx);

        rzReact.style.height = rpx + "px";
        rzBrake.style.height = bpx + "px";
        rzReactM.textContent = (live ? Math.round(rVal) : rVal) + " м";
        rzBrakeM.textContent = (live ? Math.round(bVal) : bVal) + " м";
        rzReactM.classList.toggle("show", rpx > 22);
        rzBrakeM.classList.toggle("show", bpx > 22);
        rzReactL.classList.toggle("show", rpx > 44);
        rzBrakeL.classList.toggle("show", bpx > 44);

        rulerDot.style.bottom = (baseDotBottom + (live ? rpx + bpx : 0)) + "px";

        if (live && S.phase === "react") {
          rulerPhaseLbl.textContent = "⚡ Реакція";
          rulerPhaseM.textContent   = Math.round(S.rTraveled) + " м";
          rulerPhaseM.style.color   = "var(--yellow)";
        } else if (live && S.phase === "brake") {
          rulerPhaseLbl.textContent = "🛑 Гальмо";
          rulerPhaseM.textContent   = Math.round(S.bTraveled) + " м";
          rulerPhaseM.style.color   = "var(--red)";
        }
      }

      function rulerIdlePreview() {
        updateRuler(layoutState, false);
      }

      function rulerLive() {
        if (S.phase === "idle" || S.phase === "cruise" || S.phase === "anticipate") return;
        updateRuler(layoutState, true);
      }

      function rulerReset() {
        S.rTraveled = 0;
        S.bTraveled = 0;
        rzReact.style.height = "0";
        rzBrake.style.height = "0";
        rzReactM.classList.remove("show");
        rzBrakeM.classList.remove("show");
        rzReactL.classList.remove("show");
        rzBrakeL.classList.remove("show");
        updateRulerDot();
      }

      // ── Банер та фазові індикатори ───────────────────────────────────────────
      function showBanner(type, txt) {
        bannerEl.className   = "banner show " + type;
        bannerEl.textContent = txt;
      }
      function hideBanner() {
        bannerEl.className = "banner";
      }

      function setRulerPhase(phClass, label) {
        rulerPhaseEl.className    = "ruler-phase" + (phClass ? " " + phClass : "");
        rulerPhaseLbl.textContent = label;
        rulerPhaseM.textContent   = "";
      }
      function resetRulerPhase() {
        rulerPhaseEl.className    = "ruler-phase";
        rulerPhaseLbl.textContent = "—";
        rulerPhaseM.textContent   = "";
      }

      function hlReact(on) { cardReact.classList.toggle("hl-react", on); }
      function hlBrake(on) { cardBrake.classList.toggle("hl-brake", on); }

      function setHudMode(mode) {
        hud.className = "hud" + (mode ? " hud-" + mode : "");
      }

      function startSim() {
        if (S.phase !== "idle" && S.phase !== "done") return;
        S.phase = "cruise";
        S.obsActive = false;
        S.cameraLocked = false;
        S.rTraveled = 0;
        S.bTraveled = 0;
        S.cruiseSec = 0;
        S.userReactSec = 0;
        S.pedWalkTime = 0;
        S.pedWalkDir = 1;

        rulerReset();
        hlReact(false);
        hlBrake(false);
        hideBanner();
        resetRulerPhase();
        setHudMode("cruise");
        speedWrap.style.opacity = "0.4";
        speedWrap.style.pointerEvents = "none";
      }

      function showResult() {
        const t = Math.floor(S.kmh / 10);
        hudMainLabel.textContent = "✅ Зупинковий шлях";
        hudMainVal.textContent   = S.total;
        hudMainSub.textContent   = `${t} × ${t} = ${S.total} м · реакція ${S.react} + гальмо ${S.brake}`;
        elReact.textContent      = S.react;
        elBrake.textContent      = S.brake;
        elLblReact.textContent   = "Реакція ~1 с";
        setHudMode("result");
        speedWrap.style.opacity      = "1";
        speedWrap.style.pointerEvents = "auto";
        S.phase = "idle";
      }

      /* ── Малювання ── */
      function rr(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
      }

      function drawCar(cx, cy, color, braking) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.fillStyle = "rgba(0,0,0,0.38)";
        rr(-CAR_W / 2 + 2, -CAR_H / 2 + 2, CAR_W, CAR_H, CAR_R);
        ctx.fill();
        ctx.fillStyle = color;
        rr(-CAR_W / 2, -CAR_H / 2, CAR_W, CAR_H, CAR_R);
        ctx.fill();
        ctx.fillStyle = "rgba(15,23,42,0.85)";
        rr(-11, -20, 22, 16, 3);
        ctx.fill();
        rr(-11, 6, 22, 12, 3);
        ctx.fill();
        ctx.fillStyle = "#fef9c3";
        ctx.fillRect(-13, -CAR_H / 2, 6, 3);
        ctx.fillRect(7, -CAR_H / 2, 6, 3);
        if (braking) {
          ctx.shadowColor = "#ef4444";
          ctx.shadowBlur = 14;
          ctx.fillStyle = "#ff2222";
          ctx.fillRect(-13, CAR_H / 2 - 4, 7, 4);
          ctx.fillRect(6, CAR_H / 2 - 4, 7, 4);
          ctx.shadowBlur = 0;
        } else {
          ctx.fillStyle = "#7f1d1d";
          ctx.fillRect(-13, CAR_H / 2 - 4, 7, 3);
          ctx.fillRect(6, CAR_H / 2 - 4, 7, 3);
        }
        ctx.restore();
      }

      function drawPedestrian(x, y, walkTime, phase) {
        ctx.save();

        let bodyColor, headFill, glowColor;
        if (phase === "react") {
          bodyColor = "#ef4444";
          headFill = "#fecaca";
          glowColor = "rgba(239,68,68,0.6)";
        } else if (phase === "done") {
          bodyColor = "#22c55e";
          headFill = "#dcfce7";
          glowColor = "rgba(34,197,94,0.6)";
        } else {
          bodyColor = "#f97316";
          headFill = "#ffedd5";
          glowColor = null;
        }

        if (glowColor) {
          ctx.shadowColor = glowColor;
          ctx.shadowBlur = 14;
        }

        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.beginPath();
        ctx.ellipse(x, y + 11, 9, 3, 0, 0, Math.PI * 2);
        ctx.fill();

        if (glowColor) {
          ctx.shadowColor = glowColor;
          ctx.shadowBlur = 14;
        }

        const t = walkTime || 0;
        const p = t * Math.PI * 2 * 2.5;
        const legSwing = Math.sin(p) * 6;
        const armSwing = -Math.sin(p) * 5;

        ctx.strokeStyle = bodyColor;
        ctx.lineWidth = 3;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        ctx.beginPath();
        ctx.moveTo(x, y - 1);
        ctx.lineTo(x, y + 5);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(x, y + 5);
        ctx.lineTo(x - 3 - legSwing, y + 13);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(x, y + 5);
        ctx.lineTo(x + 3 + legSwing, y + 13);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(x, y + 1);
        ctx.lineTo(x - 4 + armSwing, y + 6);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(x, y + 1);
        ctx.lineTo(x + 4 + armSwing, y + 6);
        ctx.stroke();

        ctx.fillStyle = headFill;
        ctx.strokeStyle = bodyColor;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(x, y - 6, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.shadowBlur = 0;
        ctx.restore();
      }

      /* ── Пішохідний перехід ── */
      function drawCrosswalk(cx, roadW, y) {
        const stripeH = 9;
        const count = 8;
        const totalH = count * stripeH;
        const startY = y - totalH / 2;

        for (let i = 0; i < count; i++) {
          const sy = startY + i * stripeH;
          ctx.fillStyle = i % 2 === 0 ? "#ffffff" : "#dc2626";
          ctx.fillRect(cx - roadW / 2, sy, roadW, stripeH);
        }
      }

      /* ── Main draw ── */
      function draw(layout) {
        const { W, H, roadW, cx, carY, pxM } = layout;

        ctx.fillStyle = "#052e16";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "#1e293b";
        ctx.fillRect(cx - roadW / 2, 0, roadW, H);
        ctx.strokeStyle = "#334155";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(cx - roadW / 2, 0);
        ctx.lineTo(cx - roadW / 2, H);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cx + roadW / 2, 0);
        ctx.lineTo(cx + roadW / 2, H);
        ctx.stroke();
        ctx.strokeStyle = "rgba(226,232,240,0.4)";
        ctx.lineWidth = 3;
        ctx.setLineDash([22, 18]);
        ctx.lineDashOffset = -S.roadOff;
        ctx.beginPath();
        ctx.moveTo(cx, 0);
        ctx.lineTo(cx, H);
        ctx.stroke();
        ctx.setLineDash([]);

        S.trees.forEach((t) => {
          const tx = cx + (roadW / 2 + 28) * t.side;
          ctx.fillStyle = "#713f12";
          ctx.fillRect(tx - 3, t.y, 6, 16);
          ctx.fillStyle = "#14532d";
          ctx.beginPath();
          ctx.arc(tx, t.y, t.sz, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#166534";
          ctx.beginPath();
          ctx.arc(tx - 3, t.y - 4, t.sz * 0.6, 0, Math.PI * 2);
          ctx.fill();
        });

        if (S.obsActive) {
          const crossY = S.cameraLocked ? S.crosswalkY : carY - S.pedDist * pxM;
          drawCrosswalk(cx, roadW, crossY);
        }

        const CROSSWALK_HALF = 56;
        const STOP_GAP = 6;
        let activeCarY;
        if (S.cameraLocked) {
          const traveledPx = (S.rTraveled + S.bTraveled) * pxM;
          const stopY = S.crosswalkY + CROSSWALK_HALF + STOP_GAP + CAR_H / 2;
          const rawY = S.fixedDangerY - traveledPx;
          activeCarY = Math.max(rawY, stopY);
        } else {
          activeCarY = carY;
        }

        if (S.cameraLocked) {
          const dangerY = S.fixedDangerY;
          const rpx = S.rTraveled * pxM;

          if (rpx > 0) {
            ctx.fillStyle = "rgba(234,179,8,0.22)";
            ctx.fillRect(cx - roadW / 2 + 2, dangerY - rpx, roadW - 4, rpx);
          }

          const carNoseY = activeCarY - CAR_H / 2;
          const redTop = carNoseY;
          const redBot = dangerY - rpx;
          const bpxReal = redBot - redTop;
          if (bpxReal > 0) {
            ctx.fillStyle = "rgba(239,68,68,0.28)";
            ctx.fillRect(cx - roadW / 2 + 2, redTop, roadW - 4, bpxReal);
          }

          ctx.fillStyle = "#facc15";
          ctx.fillRect(cx - roadW / 2, dangerY, roadW, 3);
          ctx.font = "bold 11px Barlow Condensed,sans-serif";
          ctx.textAlign = "center";
          ctx.fillStyle = "#facc15";
          ctx.fillText("⚡ ПОЧАТОК РЕАКЦІЇ", cx, dangerY + 16);

          ctx.font = "bold 11px Barlow Condensed,sans-serif";
          ctx.textAlign = "left";
          const lx = cx + roadW / 2 + 5;
          if (rpx > 20) {
            ctx.fillStyle = "rgba(234,179,8,0.9)";
            ctx.fillText(
              Math.round(S.rTraveled) + " м",
              lx,
              dangerY - rpx / 2 + 4,
            );
          }
          if (bpxReal > 20) {
            ctx.fillStyle = "rgba(239,68,68,0.9)";
            ctx.fillText(
              Math.round(S.bTraveled) + " м",
              lx,
              redTop + bpxReal / 2 + 4,
            );
          }
        }

        if (S.obsActive) {
          const pedY = S.cameraLocked ? S.fixedPedY : carY - S.pedDist * pxM;
          drawPedestrian(S.pedX, pedY, S.pedWalkTime, S.phase);
        }

        const braking = S.phase === "brake" || S.phase === "done";
        drawCar(cx, activeCarY, "#3b82f6", braking);
      }

      /* ── Game loop ── */
      let lastT = 0;
      function loop(ts) {
        if (!lastT) lastT = ts;
        let dt = (ts - lastT) / 1000;
        if (dt > 0.1) dt = 0.1;
        lastT = ts;

        // Використовуємо кешований layout замість виклику функції
        const layout = layoutState;
        const { pxM, carY, roadW } = layout;
        const mps = (S.kmh * 1000) / 3600;

        let curMps = mps;
        if (S.phase === "brake") {
          const decel = (mps * mps) / (2 * S.brake);
          curMps = Math.sqrt(Math.max(0, mps * mps - 2 * decel * S.bTraveled));
        } else if (S.phase === "done" || S.phase === "idle") {
          curMps = 0;
        }

        function moveWorld(spd) {
          if (spd <= 0) return;
          const px = spd * pxM * dt;
          S.roadOff = (S.roadOff + px) % 40;
          S.trees.forEach((t) => {
            t.y += px;
            if (t.y > layout.H + 40) {
              t.y = -40;
              t.side = Math.random() > 0.5 ? 1 : -1;
            }
          });
        }

        if (S.phase !== "idle" && S.phase !== "done") {
          if (!S.cameraLocked) moveWorld(curMps);

          if (S.obsActive) {
            if (!S.cameraLocked) {
              S.pedDist -= curMps * dt;
            }

            if (S.phase === "react") {
              S.rTraveled += curMps * dt;
              S.userReactSec += dt;
            } else if (S.phase === "brake") {
              S.bTraveled += curMps * dt;
            }

            const pedSpeed = roadW / 4.5; 
            S.pedX += pedSpeed * S.pedWalkDir * dt;
            S.pedWalkTime += dt;
          }
        }

        if (S.phase === "done" && S.obsActive) {
          S.pedX += (roadW / 4.5) * S.pedWalkDir * dt;
          S.pedWalkTime += dt;
        }

        if (S.phase === "cruise") {
          S.cruiseSec += dt;
          if (!S.obsActive && S.cruiseSec > 1.4) {
            S.obsActive = true;
            S.rTraveled = 0;
            S.bTraveled = 0;
            S.userReactSec = 0;
            S.pedDist = S.total + 2;
            S.pedX = layout.cx - roadW / 2 - 2;
            S.pedWalkDir = 1; 
            S.pedWalkTime = 0;
            S.phase = "anticipate";
            setHudMode("cruise");
            showBanner("warn", "👀 ОЦІНЮЙТЕ ОБСТАНОВКУ");
          }
        } else if (S.phase === "anticipate") {
          if (S.pedDist <= S.total) {
            S.phase = "react";

            S.cameraLocked = true;
            S.fixedDangerY = carY;
            const crossY = carY - S.total * pxM;
            S.fixedPedY = Math.max(crossY, 80);
            S.crosswalkY = S.fixedPedY;

            S.rTraveled = 0;
            S.bTraveled = 0;
            S.userReactSec = 0;
            hlReact(true);
            setHudMode("react");
            hideBanner();
            setRulerPhase("ph-react", "⚡ Реакція");
          }
        } else if (S.phase === "react") {
          if (S.userReactSec >= 1.2 || S.rTraveled >= S.react) {
            S.phase = "brake";
            hlReact(false);
            hlBrake(true);
            setHudMode("brake");
            setRulerPhase("ph-brake", "🛑 Гальмо");
          }
        } else if (S.phase === "brake") {
          if (curMps <= STOP_SPEED_MPS || S.bTraveled >= S.brake) {
            S.bTraveled = S.brake;
            S.phase = "done";
            hlBrake(false);
            setRulerPhase("ph-done", "✅ Зупинка");
            setTimeout(showResult, 1000);
          }
        }

        rulerLive();
        updateHudMain();
        draw(layout);
        requestAnimationFrame(loop);
      }

      resize();
      applyCalc(S.kmh);
      rulerIdlePreview();
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
